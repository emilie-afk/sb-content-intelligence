name: Daily Auto-Cluster

on:
  schedule:
    - cron: '30 0 * * *'   # 7:30 AM Vietnam (UTC+7)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  cluster:
    runs-on: ubuntu-latest
    steps:
      - name: Cluster all New signals
        run: |
          REMAINING=1
          CALLS=0
          MAX_CALLS=20
          ERRORS=0
          LAST_REMAINING=-1
          STALLS=0

          while [ "$REMAINING" -gt 0 ] && [ "$CALLS" -lt "$MAX_CALLS" ] && [ "$ERRORS" -lt 3 ] && [ "$STALLS" -lt 3 ]; do
            # `|| true` so a curl failure (timeout, network) doesn't kill the
            # job via set -e — it falls through to the retry logic below.
            RESPONSE=$(curl -s -w '\n%{http_code}' -X POST \
              https://sb-content-intelligence.netlify.app/.netlify/functions/batch-cluster \
              -H "Content-Type: application/json" \
              -H "x-internal-secret: ${{ secrets.INTERNAL_SECRET }}" \
              -d '{}' \
              --max-time 30) || true

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            if [ -z "$HTTP_CODE" ] || [ "$HTTP_CODE" != "200" ]; then
              echo "HTTP $HTTP_CODE — retrying..."
              ERRORS=$((ERRORS + 1))
              sleep 5
              continue
            fi

            REMAINING=$(echo "$BODY" | jq -r '.remaining // 0')
            PROCESSED=$(echo "$BODY" | jq -r '.processed // 0')
            CALLS=$((CALLS + 1))
            ERRORS=0

            echo "Call $CALLS: processed=$PROCESSED, remaining=$REMAINING"

            # Stall detection: if remaining doesn't drop for 3 calls in a row,
            # those signals are failing clustering — stop instead of burning
            # API calls retrying them all the way to MAX_CALLS.
            if [ "$REMAINING" = "$LAST_REMAINING" ]; then
              STALLS=$((STALLS + 1))
            else
              STALLS=0
            fi
            LAST_REMAINING=$REMAINING

            if [ "$REMAINING" -gt 0 ]; then
              # 15s between dispatch batches — analyses run in the background,
              # so this throttles how many are in flight at once
              sleep 15
            fi
          done

          if [ "$STALLS" -ge 3 ]; then
            echo "⚠️ Stopped: $REMAINING signals are stuck (not clustering after 3 attempts) — check Netlify ai-analyze logs"
          fi
          echo "Done — $CALLS calls made, $REMAINING signals still queued"
